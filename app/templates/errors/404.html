{% extends "base.html" %}

{% block title %}404 Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
    <h1 class="text-6xl font-mono font-bold text-cyber-secondary neon-border rounded p-4 inline-block mb-4">404</h1>
    <h2 class="text-2xl font-mono text-white mb-6">Page Not Found</h2>
    <p class="text-gray-400 font-mono mb-8">The requested sector of the grid does not exist.</p>
    <a href="/" class="px-6 py-3 border border-cyber-primary text-cyber-primary font-bold font-mono rounded hover:bg-cyber-primary hover:text-cyber-dark transition-all">Return to Core</a>
</div>
{% endblock %}
